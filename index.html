<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекламная Платформа</title>
    <style>
        :root {
            --accent: #ffcc00;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-secondary: #8b949e;
        }

        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }

        h1 { color: var(--accent); text-transform: uppercase; margin-bottom: 30px; font-size: 26px; letter-spacing: 1px; }

        .order-box { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 380px; 
            margin: 0 auto; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
        }

        label { display: block; text-align: left; margin: 15px 0 8px 10px; color: var(--text-secondary); font-size: 13px; }

        select, input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; 
            background: var(--bg); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        .price-display { font-size: 30px; color: var(--accent); font-weight: 700; margin: 20px 0 5px 0; padding-top: 15px; border-top: 1px solid var(--border); }

        .currency-info { font-size: 14px; color: var(--text-secondary); margin-bottom: 25px; }

        .btn-order { 
            background: var(--accent); color: #000; padding: 18px; width: 100%; 
            border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: block; margin-bottom: 15px;
        }

        .btn-pay-link { color: #238636; text-decoration: none; font-size: 14px; font-weight: 600; display: inline-block; }

        .divider { color: var(--border); font-size: 12px; margin: 15px 0; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

        .instruction { font-size: 11px; color: var(--text-secondary); margin-top: 20px; border: 1px dashed var(--border); padding: 10px; border-radius: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>РЕКЛАМА</h1>

    <div class="order-box">
        <label>Выберите площадку:</label>
        <select id="channel" onchange="updatePrice()">
            <option value="1.00">Радио Удвох — 1.00 USDT</option>
            <option value="0.02">Лотерея на удачу — 0.02 USDT</option>
            <option value="0.02">Токен в кармане — 0.02 USDT</option>
            <option value="0.02">Интервью Софийки — 0.02 USDT</option>
            <option value="0.05">ПАКЕТ: Все площадки — 0.05 USDT</option>
        </select>
        
        <label>Количество дней:</label>
        <input type="number" id="days" value="1" min="1" oninput="updatePrice()">
        
        <div class="price-display"><span id="total">1.00</span> USDT</div>
        <div class="currency-info">
            ≈ <span id="total-ton">0.2000</span> TON | ≈ <span id="total-uah">0.80</span> грн
        </div>

        <button class="btn-order" onclick="goToOrder()">ОФОРМИТЬ ЗАКАЗ</button>

        <div class="divider">ИЛИ</div>

        <a href="pay.html?price=0.2000" id="direct-pay" class="btn-pay-link">💳 ПЕРЕЙТИ К ОПЛАТЕ</a>
        
        <div class="instruction">
            ⚠️ Детали заказа и ссылка на оплату будут продублированы ботом <b>@tokenpist_bot</b>.
        </div>
    </div>

    <script>
        // Курс 1 USDT = 0.2 TON
        const TON_RATE = 0.2; 

        function updatePrice() {
            const val = document.getElementById('channel').value;
            const days = document.getElementById('days').value || 1;
            const totalUsdt = (val * days).toFixed(2);
            
            // Расчет TON с точностью до 4 знаков
            let totalTon = (totalUsdt * TON_RATE).toFixed(4);
            
            document.getElementById('total').innerText = totalUsdt;
            document.getElementById('total-ton').innerText = totalTon;
            // Расчет гривны (курс 40)
            document.getElementById('total-uah').innerText = (totalUsdt * 40).toFixed(2);
            
            // Обновляем ссылку для страницы оплаты
            document.getElementById('direct-pay').href = `pay.html?price=${totalTon}`;
        }

        function goToOrder() {
            const select = document.getElementById('channel');
            const channelName = select.options[select.selectedIndex].text.split(' — ')[0];
            const days = document.getElementById('days').value;
            const totalUsdt = document.getElementById('total').innerText;
            const totalTon = document.getElementById('total-ton').innerText;
            
            const msg = `ЗАКАЗ РЕКЛАМЫ%0A📍 Площадка: ${channelName}%0A📅 Срок: ${days} дн.%0A💰 Итого: ${totalUsdt} USDT (${totalTon} TON)`;
            
            window.open(`https://t.me/tokenpist_bot?text=${msg}`, '_blank');
            
            setTimeout(() => {
                window.location.href = `pay.html?price=${totalTon}`;
            }, 800);
        }
        
        updatePrice();
    </script>
</body>
</html>
